<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZashaGo</title>
    <style>
      :root {
        --k-bg:      #0C0C16;
        --k-surface: #13131F;
        --k-card:    #191927;
        --k-card2:   #1E1E2E;
        --k-border:  #252538;
        --k-border2: #2E2E45;
        --k-accent:  #00C896;
        --k-accent2: #00A87D;
        --k-glow:    rgba(0,200,150,0.12);
        --k-text:    #E8E8F2;
        --k-sub:     #A0A0BC;
        --k-muted:   #6A6A88;
        --k-danger:  #F56565;
        --k-warn:    #F6AD55;
        --k-info:    #63B3ED;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { background: #0C0C16; color: #E8E8F2; }
      #root { background: #0C0C16; min-height: 100vh; }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      input, textarea, select { font-family: inherit; }
      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2E2E45; border-radius: 3px; }
      input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus {
        -webkit-box-shadow: 0 0 0 30px #1E1E2E inset !important;
        -webkit-text-fill-color: #E8E8F2 !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
